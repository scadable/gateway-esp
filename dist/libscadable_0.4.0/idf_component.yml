version: 0.4.0
targets:
- esp32
- esp32s2
- esp32s3
- esp32c2
- esp32c3
- esp32c6
- esp32h2
description: "SCADABLE platform integration for ESP32. Boots, loads the\ndevice certificate
  from NVS, discovers the MQTT broker via\nedge.scadable.com, connects over TLS, publishes
  heartbeats,\nand handles OTA updates. Optional streaming file upload to\nuploads.scadable.com
  (compile-time opt-in). Customer brings\ntheir own network (Wi-Fi / Ethernet / cellular).\n"
license: MIT
tags:
- scadable
- iot
- mqtt
- ota
- fleet
- telemetry
dependencies:
  idf:
    version: '>=5.1'
url: https://github.com/scadable/gateway-esp
repository: https://github.com/scadable/gateway-esp.git
documentation: https://github.com/scadable/gateway-esp#readme
issues: https://github.com/scadable/gateway-esp/issues
