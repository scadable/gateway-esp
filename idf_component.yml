# ESP-IDF Component Registry manifest for scadable/libscadable.
#
# Once published, customers depend on this by adding to their own
# main/idf_component.yml:
#
#   dependencies:
#     scadable/libscadable: "^0.1.0"
#
# Then the IDF Component Manager pulls this component into their build.

version: "0.2.3"
description: |
  SCADABLE platform integration for ESP32. Boots, loads the
  device certificate from NVS, discovers the MQTT broker via
  edge.scadable.com, connects over TLS, publishes heartbeats,
  and handles OTA updates. Optional streaming file upload to
  uploads.scadable.com (compile-time opt-in). Customer brings
  their own network (Wi-Fi / Ethernet / cellular).

url: https://github.com/scadable/gateway-esp
issues: https://github.com/scadable/gateway-esp/issues
documentation: https://github.com/scadable/gateway-esp#readme
repository: https://github.com/scadable/gateway-esp.git
license: MIT

tags:
  - scadable
  - iot
  - mqtt
  - ota
  - fleet
  - telemetry

targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c2
  - esp32c3
  - esp32c6
  - esp32h2

dependencies:
  idf:
    version: ">=5.1"
